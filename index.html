<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Droolcat Agent</title>
<link rel="stylesheet" href="/src/styles.css"/>
</head>
<body>
<div class="frame"><div class="window">
  <div class="body">
    <aside class="side">
      <div class="newbtn" id="newsession"><span class="aw-ic" id="ic-plus"></span>New chat</div>
      <div class="seclabel">Chats</div>
      <div id="sesslist"></div>
      <div class="seclabel cclabel">Claude Code <button class="ccref" id="ccrefresh" title="rescan sessions">⟳</button></div>
      <div id="cclist"><div class="empty-side">Desktop app only — observe your live <code>claude</code> sessions here.</div></div>
    </aside>
    <div class="sideresize" id="sideresize" title="drag to resize"></div>
    <div class="col">
      <div class="toolbar">
        <span class="h" id="sesstitle">No session</span>
        <span class="aw-pill p-info" id="headpill"></span>
        <span class="spacer"></span>
        <div class="srcsel" id="viewsel">
          <button data-view="agents" class="active">agents</button>
          <button data-view="code">code</button>
        </div>
        <span class="conn" id="conn" title="bridge status">offline</span>
        <div class="srcsel" id="srcsel">
          <button data-src="live" class="active">live</button>
          <button data-src="sample">sample</button>
        </div>
        <button class="replay" id="stopbtn" style="display:none;color:var(--color-text-danger)">stop</button>
        <button class="replay" id="replay"><span class="aw-ic" id="ic-play"></span>replay</button>
        <button class="replay" id="chatbtn" title="conversation + git panel">chat</button>
        <button class="replay" id="panelbtn" title="logs / agents / stats">panels</button>
        <button class="replay" id="findbtn" title="search the board">find</button>
        <div class="zc"><button id="zout">−</button><span class="zl" id="zl">100%</span><button id="zin">+</button><button id="fit">fit</button><button id="tolatest" title="jump to latest">↓</button><button id="followbtn" title="follow live — keep the newest node in view as the graph grows"><span class="aw-ic" id="ic-follow"></span></button></div>
      </div>
      <div class="viewport" id="viewport"><div class="world" id="world"><svg class="edges" id="edges"></svg></div>
        <div class="searchbar" id="searchbar" style="display:none">
          <input id="searchinput" placeholder="search the board…"/>
          <span class="scount" id="scount"></span>
          <button id="sprev" title="previous">↑</button>
          <button id="snext" title="next">↓</button>
          <button id="sclose" title="close">×</button>
        </div>
        <div class="empty" id="empty">
          <div class="emptyinner">
            <div class="emptyic" id="ic-empty"></div>
            <div class="emptyh">Drive Claude Code as a graph</div>
            <div class="emptyp">Type a prompt below to start a live <code>claude -p</code> session, or switch to <b>sample</b> to replay a captured transcript.</div>
          </div>
        </div>
        <div class="hudpanel" id="hud" style="display:none">
          <div class="hudtabs" id="hudtabs">
            <button data-tab="logs" class="active">logs</button>
            <button data-tab="agents">agents</button>
            <button data-tab="stats">stats</button>
            <span style="flex:1"></span>
            <button class="hudclose" id="hudclose">×</button>
          </div>
          <div class="hudbody" id="hudbody"></div>
        </div>
        <div class="voicemode s-idle" id="voicemode" style="display:none">
          <div class="vm-stage">
            <div class="vm-lane" id="vmLane"><span class="sw" style="background:var(--wt-main)"></span><span id="vmLaneName">main</span></div>
            <div class="vm-orb"><canvas class="vm-rings" id="vmRings"></canvas><div class="vm-core" id="vmCore"></div></div>
            <div class="vm-status" id="vmStatus">Listening…</div>
            <div class="vm-transcript" id="vmTranscript"></div>
            <div class="vm-fallback" id="vmFallback"><input id="vmFallbackInput" placeholder="type a message…"/></div>
            <div class="vm-controls">
              <button class="vm-btn" id="vmPause">pause</button>
              <button class="vm-btn primary" id="vmExit">done</button>
            </div>
          </div>
        </div>
      </div>
      <div class="promptbar">
        <div class="lanewrap" id="lanewrap">
          <div class="lanemenu" id="lanemenu"></div>
          <button class="lanebtn" id="lanebtn">
            <span class="sw" id="laneSw" style="background:var(--wt-main)"></span>
            <span class="lanenm" id="lanename">main</span>
            <span class="lanechev">▴</span>
          </button>
        </div>
        <div class="lanewrap" id="pluswrap">
          <div class="lanemenu plusmenu" id="plusmenu">
            <div class="mhead">Working folder</div>
            <input class="cbinput" id="folder" placeholder="(home) — project folder to work in…"/>
            <label class="cbtoggle"><input type="checkbox" id="allowedits" checked/> allow edits (bypass permissions)</label>
            <div class="lanemenuitem add" id="plusnewlane"><span class="aw-ic" id="ic-newlane2"></span>New agent lane</div>
          </div>
          <button class="pbicon" id="pbnew" title="folder &amp; options"><span class="aw-ic" id="ic-newlane"></span></button>
        </div>
        <input class="pinput" id="prompt" placeholder="Message Claude — each turn continues this lane…"/>
        <button class="pbicon" id="pbmic" title="voice dictation"><span class="aw-ic" id="ic-mic"></span></button>
        <button class="pbtag" id="pbmode" title="permission mode — click to toggle">bypass</button>
        <div class="lanewrap" id="modelwrap">
          <div class="lanemenu modelmenu" id="modelmenu"></div>
          <button class="pbtag" id="pbmodel" title="model — click to choose">claude</button>
        </div>
        <button class="sendbtn" id="send"><span class="aw-ic" id="ic-up"></span></button>
      </div>
    </div>
    <div class="chatpanel" id="chatpanel">
      <div class="cp-head"><span class="cp-tabs" id="cptabs"><button data-cp="chat" class="active">conversation</button><button data-cp="git">git</button></span><button class="cp-x" id="chatclose">×</button></div>
      <div class="chatbody" id="chatbody"></div>
    </div>
    <div class="inspector" id="inspector"><div class="inwrap" id="inwrap"></div></div>
  </div>
</div></div>
<div class="palette" id="palette" style="display:none">
  <div class="palbox">
    <input id="palinput" placeholder="Type a command or search chats…" autocomplete="off" spellcheck="false"/>
    <div class="pallist" id="pallist"></div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
